name: Strict quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint, contracts, and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit production and development dependencies
        run: npm audit --audit-level=moderate

      - name: Lint with zero warnings
        run: npm run lint

      - name: Run deterministic contract tests
        run: npm run test:unit

  browser:
    name: Chromium behavior, accessibility, and A4
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium and system libraries
        run: npx playwright install --with-deps chromium

      - name: Run browser suite
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
