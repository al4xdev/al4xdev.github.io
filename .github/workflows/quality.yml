name: Strict quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint, contracts, and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit production and development dependencies
        run: npm audit --audit-level=moderate

      - name: Verify published test inventory
        run: npm run meta:check

      - name: Lint with zero warnings
        run: npm run lint

      - name: Run deterministic contract tests
        run: npm run test:unit

  browser:
    name: Chromium behavior, accessibility, and A4
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium, system libraries, and PDF inspection tools
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get install --yes poppler-utils

      - name: Run browser suite
        run: npm run test:e2e
        env:
          CI: true

      - name: Export official bilingual CV PDFs
        run: |
          npm run cv:export -- --lang en
          npm run cv:export -- --lang pt-BR

      - name: Validate official CV PDFs
        run: |
          for pdf in \
            /tmp/alexsandro-pessoa-cv-en.pdf \
            /tmp/alexsandro-pessoa-cv-pt-BR.pdf
          do
            info="$(pdfinfo "$pdf")"
            pages="$(printf '%s\n' "$info" | awk '/^Pages:/ { print $2 }')"
            test "$pages" -ge 1
            test "$pages" -le 2
            printf '%s\n' "$info" | grep -Eq '^Page size:[[:space:]]+59[45]\.[0-9]+ x 84[12]\.[0-9]+ pts \(A4\)$'
            printf '%s\n' "$info" | grep -Eq '^Tagged:[[:space:]]+yes$'
            for field in Title Author Subject Keywords
            do
              printf '%s\n' "$info" | grep -Eq "^${field}:[[:space:]]+[^[:space:]].*$"
            done
          done

      - name: Upload official CV PDFs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: official-cv-pdfs
          path: |
            /tmp/alexsandro-pessoa-cv-en.pdf
            /tmp/alexsandro-pessoa-cv-pt-BR.pdf
          if-no-files-found: error
          retention-days: 7

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Publish verified static site
    if: github.event_name != 'pull_request'
    needs: browser
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Stage public allowlist
        run: |
          mkdir -p _site/articles _site/cv _site/mentors
          cp index.html styles.css app.js site-meta.json .nojekyll _site/
          cp articles/index.html articles/styles.css articles/reader.js articles/content.js _site/articles/
          cp cv/index.html cv/styles.css cv/render.js cv/embed.js cv/content.js _site/cv/
          cp mentors/content.js _site/mentors/

      - name: Download official CV PDFs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: official-cv-pdfs
          path: _site/cv

      - name: Verify public CV allowlist
        run: |
          test -f _site/cv/alexsandro-pessoa-cv-en.pdf
          test -f _site/cv/alexsandro-pessoa-cv-pt-BR.pdf
          test -z "$(find _site -type f -name '*-preview-*.png' -print -quit)"

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
